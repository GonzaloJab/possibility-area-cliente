# Render Infrastructure as Code — https://render.com/docs/blueprint-spec
# Three services: api (FastAPI), web (clients), admin (e.g. admin.possibility.es).
# Same Dockerfiles run locally and on Render. Migrate to Hetzner later by
# pulling the same images from GHCR.
services:
  - type: web
    name: possibility-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_ASYNC
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_MINUTES
        value: 10080
      # Set in dashboard, e.g. https://clientes.possibility.es,https://admin.possibility.es
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: possibility-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    envVars:
      # Required for `vite build` inside Docker — must be your public API HTTPS origin (not repo .env).
      - key: VITE_API_URL
        sync: false

  - type: web
    name: possibility-admin
    runtime: docker
    dockerfilePath: ./apps/admin/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false  # same public HTTPS API as web, e.g. https://possibility-api.onrender.com
      - key: VITE_CLIENT_URL
        sync: false  # public client app, e.g. https://clientes.possibility.es (impersonation / open-as-client)
    # Custom domain: admin.possibility.es → DNS CNAME to Render’s target; redeploy after changing VITE_*.
