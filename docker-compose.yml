# API + Web in Docker against Postgres URLs from repo-root `.env`.
# Use Neon: set DATABASE_URL + DATABASE_URL_ASYNC in `.env` (same as native dev).
# API runs Alembic + seed on boot → Felipe demo is created once in that database.
#
# Local Postgres container (offline): compose -f docker-compose.yml -f docker-compose.postgres.yml up --build

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: possibility-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env — Neon pooled URL recommended}
      DATABASE_URL_ASYNC: ${DATABASE_URL_ASYNC:?Set DATABASE_URL_ASYNC in .env — postgresql+asyncpg with ?ssl=require}
      JWT_SECRET: ${JWT_SECRET:-dev-docker-change-me-for-production}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      PORT: ${PORT:-4000}
      ENV: ${ENV:-development}
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: possibility-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"
