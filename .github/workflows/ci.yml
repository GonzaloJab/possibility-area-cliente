name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-lint:
    name: API · lint + typecheck (Python)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: apps/api }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff mypy
      - run: ruff check app
      - run: mypy app --ignore-missing-imports || true

  web-lint:
    name: Web · lint + typecheck + build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run lint:web
      - run: npm run typecheck:web
      - run: npm run build:web

  admin-lint:
    name: Admin · lint + typecheck + build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run lint:admin
      - run: npm run typecheck:admin
      - run: npm run build:admin

  docker-build:
    name: Docker · build all images (no push)
    runs-on: ubuntu-latest
    needs: [api-lint, web-lint, admin-lint]
    strategy:
      matrix:
        include:
          - name: api
            file: apps/api/Dockerfile
          - name: web
            file: apps/web/Dockerfile
          - name: admin
            file: apps/admin/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
          build-args: |
            VITE_API_URL=https://vite-build.invalid
            VITE_CLIENT_URL=https://vite-build.invalid
